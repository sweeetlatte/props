<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Props</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
<body> 
    <div id="root"></div>

    <script type="text/babel">
        // Course Item 
        const Courses = [
            {
                "id": 2,
                "title": "HTML, CSS từ Zero đến Hero",
                "slug": "html-css",
                "description": "Trong khóa này chúng ta sẽ cùng nhau xây dựng giao diện 2 trang web là The Band & Shopee.",
                "thumbnail": "courses/2.png",
                "content": null,
                "preview_origin": "youtube",
                "preview_youtube_id": "R6plN3FvzFY",
                "preview_path": null,
                "language": "html",
                "syntax_highligh": "language-html",
                "level": "Trình độ cơ bản",
                "priority": 10,
                "students_count": 92612,
                "deleted_at": null,
                "created_at": "2020-04-10T14:23:13.000000Z",
                "updated_at": "2021-12-14T13:40:45.000000Z",
                "thumbnail_cdn": "https://cdn.fullstack.edu.vn/f8-learning/courses/2.png"
            },
            {
                "id": 1,
                "title": "JavaScript Cơ Bản",
                "slug": "javascript-co-ban",
                "description": "Học Javascript cơ bản phù hợp cho người chưa từng học lập trình. Với hơn 100 bài học và có bài tập thực hành sau mỗi bài học.",
                "thumbnail": "courses/1.png",
                "content": null,
                "preview_origin": "youtube",
                "preview_youtube_id": "0SJE9dYdpps",
                "preview_path": null,
                "language": "javascript",
                "syntax_highligh": "language-javascript",
                "level": "Trình độ cơ bản",
                "priority": 30,
                "students_count": 56962,
                "deleted_at": null,
                "created_at": "2020-06-10T14:23:13.000000Z",
                "updated_at": "2021-12-14T13:35:30.000000Z",
                "thumbnail_cdn": "https://cdn.fullstack.edu.vn/f8-learning/courses/1.png"
            }
        ]

        // PostItem.js
        function PostItem({thumbnail_cdn, title, description, level, students_count}){
            return (
                <div className="wrapper">
                    <img src={thumbnail_cdn}/>
                    <h3
                        onClick={ ()=> console.log(title)}
                    >
                        {title}
                    </h3>
                    <p>{description}</p>
                    <p>{level}</p>
                    <p>{students_count}</p>
                </div>
            )
        } 

        // App.js
            function App(){
                return (
                    <div className="post-list">
                        {
                            Courses.map((course)=>(
                                <PostItem 
                                    key = {course.id}
                                    thumbnail_cdn = {course.thumbnail_cdn}
                                    title = {course.title}
                                    description = {course.description}
                                    level = {course.level}
                                    students_count = {course.students_count}
                                />
                            ))
                        }
                    </div>                 
                )
            }

        // index.js
        ReactDOM.render(<App />, document.querySelector('#root'))
    </script>
</body>
</html>
